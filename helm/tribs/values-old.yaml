# Default values for tribs.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: your-registry.example.com/your-org/tethysapp-tribs/dev@sha256  # TODO update to correct repo when published
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: sha256:your-image-digest-here  # TODO update to correct digest when published

imagePullSecrets:
  - name: "github-registry"


nameOverride: ""
fullnameOverride: ""

postgis:
  fullnameOverride: "tribs-db"
  postgres_user: ""
  postgres_password: ""
  extra_config:
    max_connections: "500"
    shared_buffers: "512MB"
    work_mem: "5MB"
    autovacuum: "on"
  service:
    type: ClusterIP
    port: 5432
  storage_size: 2Gi
  resources: 
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 2
      memory: 512Mi

tethys:
  workspace_size: "5Gi"   
  settings:
    asgi_processes: 4
    tethys_settings_flags: "--production, --overwrite, --bypass-portal-home"
    portal_title: "Aquaveo Portal"
    primary_color: "#256291"
    secondary_color: "#7C99AC"
    background_color: "#D7D3C7"
    client_max_body_size: "1G"
    file_upload_max_memory_size: "1073741824"
    data_upload_max_memory_size: "1073741824"
    copyright: "Copyright © 2023 Aquaveo, LLC"
    recaptcha_public_key: ""
    recaptcha_private_key: ""
    other_settings: "--set ENABLE_CAPTCHA False --set DATA_UPLOAD_MAX_NUMBER_FIELD 10000"
    media_root: "/fdbs"
  database:
    tethys_db_name: ""
    tethys_db_username: ""
    tethys_db_password: ""
    tethys_db_superuser: ""
    tethys_db_superuser_pass: ""
  super_user:
    username: ""
    password: ""
    email: "none@none.com"
  condorPrivateKeySecret:
    name: "condor-ssh-key"    
  updateStrategy: "Recreate"
  app:
    condor_fdb_root: 
      mountPath: "/fdbs"
    cesium_api_key: ""

condor:
  secrets:
    condor_pool_password: ""
    authorized_keys: ""
    condor_private_key: ""


geoserver:
  enabled: true

  persistent:
    raster:
      pvname: gs-cloud-raster-nfs
      pvcname: gs-cloud-raster-nfs-claim
      pvcreation: false
      storageClass:
        enabled: false
        storageClassName: 'tribs-storage'
    config:
      pvname: gs-cloud-datadir-nfs
      pvcname: gs-cloud-datadir-nfs-claim
      pvcreation: false
      storageClass:
        enabled: false
        storageClassName: 'tribs-storage'

    cache:
      pvname: gs-cloud-gwc-cache-nfs
      pvcname: gs-cloud-gwc-cache-nfs-claim
      pvcreation: false
      storageClass:
        enabled: false
        storageClassName: 'tribs-storage'

  pdb: &common-pdb
    enabled: false

  # tweak the resources here
  resources: &common-resources
    requests:
      memory: 512Mi
      cpu: 0.1
    limits:
      memory: 4Gi
      cpu: 4.0

  # this should make sure that the containers are started after the database is started
  containers_additional_conf: &containers-additional-conf
    resources:
      <<: *common-resources
    livenessProbe:
      initialDelaySeconds: 60
      periodSeconds: 10
    readinessProbe:
      periodSeconds: 5
      initialDelaySeconds: 60

  # in order to override env values
  env: &env-override
    RABBITMQ_HOST:
      value: 'tribs-rabbitmq'
    RABBITMQ_USER:
      value: 'geoserver'
    RABBITMQ_PASSWORD:
      type: secret
      name: 'tribs-rabbitmq'
      key: 'rabbitmq-password'
    GEOSERVER_ADMIN_USERNAME:
      value: tribs
    GEOSERVER_ADMIN_PASSWORD:
      value: pass
    GEOSERVER_BASE_PATH:
      value: /geoserver

  service: &common-service-definition
    type: ClusterIP
    servicePort: 8080
    ports:
      - name: http
        port: 8080
        protocol: TCP
        targetPort: http
  geoservercloud:
    geoserver:
      ingress:
        enabled: false
      services:
        gateway:
          pdb:
            <<: *common-pdb
          service:
            <<: *common-service-definition
          ingress:
            enabled: false
          containers:
            spring:
              env:
                <<: *env-override
              <<: *containers-additional-conf
        webui:
          pdb:
            <<: *common-pdb
          service:
            <<: *common-service-definition
          containers:
            spring:
              env:
                <<: *env-override
              <<: *containers-additional-conf
        rest:
          pdb:
            <<: *common-pdb
          service:
            <<: *common-service-definition
          containers:
            spring:
              env:
                <<: *env-override
              <<: *containers-additional-conf
        wms:
          pdb:
            <<: *common-pdb
          service:
            <<: *common-service-definition
          containers:
            spring:
              env:
                <<: *env-override
              <<: *containers-additional-conf
        wcs:
          pdb:
            <<: *common-pdb
          service:
            <<: *common-service-definition
          containers:
            spring:
              env:
                <<: *env-override
              <<: *containers-additional-conf
        wfs:
          pdb:
            <<: *common-pdb
          service:
            <<: *common-service-definition
          containers:
            spring:
              env:
                <<: *env-override
              <<: *containers-additional-conf
        gwc:
          pdb:
            <<: *common-pdb
          service:
            <<: *common-service-definition
          containers:
            spring:
              env:
                <<: *env-override
              <<: *containers-additional-conf

  postgresql:
    global:
      storageClass: 'tribs-storage'
    volumePermissions:
      enabled: true
    primary:
      persistence:
        storageClass: 'tribs-storage'
      # livenessProbe:
      #   initialDelaySeconds: 600
      # readinessProbe:
      #   initialDelaySeconds: 600



podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}


service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: '1024000m'
      nginx.ingress.kubernetes.io/proxy-read-timeout: '6000'
      nginx.ingress.kubernetes.io/proxy-send-timeout: '6000'
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: localhost
  tls: []

resources: 
 requests:
   cpu: 1
   memory: 512Mi
 limits:
  cpu: 4
  memory: 4Gi


volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

persistentVolumeClaim:
  accessModes:
    - ReadWriteMany

storageClass:
  enabled: true
  provisioner: 'k8s.io/minikube-hostpath'
  storageClassName: 'tribs-storage'
  annotations:
    storageclass.kubernetes.io/is-default-class: 'true'
  reclaimPolicy: Delete
  parameters:  {}